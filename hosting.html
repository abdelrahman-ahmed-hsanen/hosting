<!DOCTYPE html>
<html>

<head>
    <title>Grid </title>
</head>

<body>

    <div style="display: grid; grid-template-columns:repeat(3, 1fr);
    margin-bottom: 12px;
    column-gap: 12px;
    row-gap: 12px;
    ">
        <div style="background-color: green; height: 100px;">1fr </div>
        <div style="background-color: aqua; height: 100px;">1fr </div>
        <div style="background-color: red; height: 100px;">1fr </div>
        <div style="background-color: blue; height: 100px;">1fr </div>

        <div style="background-color: brown; height: 100px;">1fr </div>



    </div>

</body>

</html>
